name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Pourdown v__VERSION__'
          releaseBody: |
            First public beta.

            ## Highlights
            - One-click import of Word (.docx), Excel (.xlsx/.xls/.ods), PDF, and PowerPoint (.pptx) into editable Markdown.
            - Keeps your images — embedded pictures are extracted and rendered inline, instead of being dropped.
            - WYSIWYG editing with a raw Source-mode toggle.
            - Export to HTML and PDF.
            - English and 繁體中文 interface.

            ## Known limitations (beta)
            - Import is one-way (source → Markdown); no export back to Office formats.
            - PDF import handles text-based PDFs only — no scanned/OCR; complex multi-column layouts may reorder.
            - Spreadsheet import is capped at 500 rows/sheet; images can't be mapped to a specific cell.
            - Vector images (EMF/WMF) can't be displayed; pptx animations are dropped.
            - **Builds are unsigned / un-notarized.** On macOS you must remove the quarantine flag (`xattr -dr com.apple.quarantine "/Applications/Pourdown.app"`); on Windows, SmartScreen may need a one-time "More info → Run anyway". See the README for step-by-step install instructions.
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
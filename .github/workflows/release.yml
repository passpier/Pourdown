name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build a release for, e.g. v0.6.0'
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0   # need full history + tags for the changelog

      - name: Resolve tag & version
        id: meta
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from commit log
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            RANGE_DESC="(first release)"
            LOG=$(git log --pretty=format:'- %s (%h)' "$TAG")
          else
            RANGE_DESC="$PREV → $TAG"
            LOG=$(git log --pretty=format:'- %s (%h)' "${PREV}..${TAG}")
          fi
          {
            echo "body<<RELEOF"
            echo "## What's changed ($RANGE_DESC)"
            echo ""
            echo "$LOG"
            if [ -n "$PREV" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
            echo "RELEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create (or update) draft release
        id: create
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_NAME: Pourdown v${{ steps.meta.outputs.version }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.RELEASE_TAG;
            const payload = {
              name: process.env.RELEASE_NAME,
              body: process.env.RELEASE_BODY,
              draft: true,
              prerelease: false,  // numeric vX.Y.Z only; no beta/prerelease labels
            };
            let id;
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({ owner, repo, release_id: existing.data.id, ...payload });
              id = existing.data.id;
            } catch (e) {
              const created = await github.rest.repos.createRelease({ owner, repo, tag_name: tag, ...payload });
              id = created.data.id;
            }
            return id;

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Sync version from tag
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.create-release.outputs.version }}"

      - name: Verify version was applied
        shell: bash
        env:
          EXPECTED: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          pkg=$(node -p "require('./package.json').version")
          conf=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cargo=$(node -e "
            const m = require('fs').readFileSync('src-tauri/Cargo.toml', 'utf8')
              .match(/^\[package\][\s\S]*?^version\s*=\s*\"([^\"]*)\"/m);
            process.stdout.write(m ? m[1] : '');
          ")
          for name in pkg conf cargo; do
            val="${!name}"
            if [ "$val" != "$EXPECTED" ]; then
              echo "::error::$name version '$val' != expected '$EXPECTED'"; exit 1
            fi
          done
          echo "Version $EXPECTED verified in package.json, tauri.conf.json, Cargo.toml"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

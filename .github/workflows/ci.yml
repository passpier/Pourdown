name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint (tsc + eslint)
        run: pnpm lint

  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Pourdown only ships macOS/Windows builds (see release.yml), but the
      # `tauri` crate still pulls in GTK/WebKit bindings at compile time on
      # Linux, so cargo test/clippy need these system libs even though this
      # runner never produces a Linux artifact.
      - name: Install Tauri Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      # tauri::generate_context!() (invoked from main.rs, compiled for every
      # cargo target including tests) resolves `frontendDist` ("../dist" in
      # tauri.conf.json) at compile time and panics if the directory doesn't
      # exist. This job never runs `pnpm build` (no Node/pnpm install here,
      # by design — the frontend has its own lint job), so `dist/` is
      # missing on a fresh checkout. A stub directory satisfies the macro;
      # its contents are irrelevant since nothing in this job actually
      # launches the webview.
      - name: Stub frontendDist for tauri::generate_context!
        run: mkdir -p dist && echo '<html></html>' > dist/index.html

      # tauri-build validates every `bundle.resources` path in tauri.conf.json
      # at compile time (for cargo test/clippy too), but the PDFium DLLs are
      # fetched, not committed (see scripts/fetch-pdfium.mjs / CLAUDE.md's
      # PDFium note), and this Linux job never fetches them (the fetch script
      # refuses to run without a mac/windows --target). Empty stubs satisfy
      # the path check; `test_pdf_to_markdown_fixture` in
      # src-tauri/src/convert/pdf.rs looks for the vendored macOS framework
      # and gracefully skips (with an eprintln) when it isn't loadable, so
      # the stubs' contents are never actually read on this runner. Every
      # other converter's tests (docx/xlsx/pptx) run unconditionally.
      - name: Stub PDFium bundle resources for tauri-build
        run: |
          mkdir -p src-tauri/resources
          touch src-tauri/resources/pdfium-x64.dll src-tauri/resources/pdfium-arm64.dll

      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
